<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" font-family="Arial, Helvetica, sans-serif">

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#aaa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="22" font-weight="600" fill="#1a1a1a">LexaWEAR — Data Flow</text>
  <text x="600" y="68" text-anchor="middle" font-size="13" fill="#888">How data travels from source to display</text>

  <!-- ROW 1: SOURCES -->
  <rect x="140" y="100" width="280" height="80" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
  <text x="280" y="134" text-anchor="middle" font-size="16" font-weight="600" fill="#2C2C2A">NFC tag</text>
  <text x="280" y="158" text-anchor="middle" font-size="13" fill="#5F5E5A">Raw encoded string</text>

  <rect x="780" y="100" width="280" height="80" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
  <text x="920" y="134" text-anchor="middle" font-size="16" font-weight="600" fill="#2C2C2A">Camera</text>
  <text x="920" y="158" text-anchor="middle" font-size="13" fill="#5F5E5A">Clothing or care label bitmap</text>

  <!-- Arrows to parse -->
  <line x1="420" y1="140" x2="510" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="780" y1="140" x2="690" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ROW 2: PARSE -->
  <rect x="460" y="220" width="280" height="80" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="600" y="254" text-anchor="middle" font-size="16" font-weight="600" fill="#085041">Parse + decode</text>
  <text x="600" y="278" text-anchor="middle" font-size="13" fill="#0F6E56">Codes → localised names</text>

  <!-- Arrow to palette -->
  <line x1="600" y1="300" x2="600" y2="360" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ROW 3: COLOUR PALETTE -->
  <rect x="460" y="360" width="280" height="80" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
  <text x="600" y="394" text-anchor="middle" font-size="16" font-weight="600" fill="#4A1B0C">ColorPalette</text>
  <text x="600" y="418" text-anchor="middle" font-size="13" fill="#993C1D">Hex → colour name (44 colours)</text>

  <!-- Arrow to fields -->
  <line x1="600" y1="440" x2="600" y2="500" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ROW 4: DECODED FIELDS -->
  <rect x="340" y="500" width="520" height="80" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="600" y="534" text-anchor="middle" font-size="16" font-weight="600" fill="#26215C">Decoded fields</text>
  <text x="600" y="558" text-anchor="middle" font-size="13" fill="#534AB7">T · CL · P · S · F · SE · W · D · I · B · C · M · X</text>

  <!-- Arrows to three destinations -->
  <line x1="440" y1="580" x2="240" y2="620" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="600" y1="580" x2="600" y2="620" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="760" y1="580" x2="960" y2="620" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ROW 5: DESTINATIONS -->
  <rect x="80" y="620" width="280" height="56" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
  <text x="220" y="642" text-anchor="middle" font-size="15" font-weight="600" fill="#042C53">Care display</text>
  <text x="220" y="662" text-anchor="middle" font-size="12" fill="#185FA5">TalkBack announces each field</text>

  <rect x="460" y="620" width="280" height="56" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
  <text x="600" y="642" text-anchor="middle" font-size="15" font-weight="600" fill="#042C53">Wardrobe</text>
  <text x="600" y="662" text-anchor="middle" font-size="12" fill="#185FA5">Saved to JSON · filterable</text>

  <rect x="840" y="620" width="280" height="56" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
  <text x="980" y="642" text-anchor="middle" font-size="15" font-weight="600" fill="#042C53">Write back</text>
  <text x="980" y="662" text-anchor="middle" font-size="12" fill="#185FA5">Re-encoded → NFC tag</text>

  <!-- Write back loop arrow -->
  <path d="M1120 648 Q1160 648 1160 140 Q1160 100 1060 100" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arr-dashed)"/>

</svg>
