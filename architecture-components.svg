<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" font-family="Arial, Helvetica, sans-serif">

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-coral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="22" font-weight="600" fill="#1a1a1a">LexaWEAR — Component Relationships</text>
  <text x="600" y="68" text-anchor="middle" font-size="13" fill="#888">What connects to what</text>

  <!-- CENTRE: MainActivity -->
  <rect x="420" y="300" width="360" height="80" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="2"/>
  <text x="600" y="334" text-anchor="middle" font-size="17" font-weight="600" fill="#26215C">MainActivity</text>
  <text x="600" y="358" text-anchor="middle" font-size="13" fill="#3C3489">NFC dispatch · fragment router · language</text>

  <!-- FOUR FRAGMENTS -->

  <!-- NfcFragment — top left -->
  <rect x="80" y="100" width="260" height="80" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
  <text x="210" y="134" text-anchor="middle" font-size="15" font-weight="600" fill="#042C53">NfcFragment</text>
  <text x="210" y="158" text-anchor="middle" font-size="13" fill="#185FA5">Write wizard</text>

  <!-- CareFragment — top right -->
  <rect x="860" y="100" width="260" height="80" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
  <text x="990" y="134" text-anchor="middle" font-size="15" font-weight="600" fill="#042C53">CareFragment</text>
  <text x="990" y="158" text-anchor="middle" font-size="13" fill="#185FA5">Scan · care display</text>

  <!-- WardrobeFragment — bottom left -->
  <rect x="80" y="520" width="260" height="80" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
  <text x="210" y="554" text-anchor="middle" font-size="15" font-weight="600" fill="#042C53">WardrobeFragment</text>
  <text x="210" y="578" text-anchor="middle" font-size="13" fill="#185FA5">Storage · filtered list</text>

  <!-- FilterFragment — bottom right -->
  <rect x="860" y="520" width="260" height="80" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
  <text x="990" y="554" text-anchor="middle" font-size="15" font-weight="600" fill="#042C53">FilterFragment</text>
  <text x="990" y="578" text-anchor="middle" font-size="13" fill="#185FA5">4 filter codes</text>

  <!-- MainActivity ↔ fragments -->
  <line x1="420" y1="320" x2="340" y2="180" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="780" y1="320" x2="860" y2="180" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="420" y1="360" x2="340" y2="520" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="780" y1="360" x2="860" y2="520" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <!-- Filter → Wardrobe (filter codes) -->
  <line x1="860" y1="560" x2="340" y2="560" stroke="#185FA5" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arr)"/>
  <text x="600" y="550" text-anchor="middle" font-size="12" fill="#185FA5">filter codes</text>

  <!-- SHARED SERVICES -->

  <!-- ColorPalette — bottom centre -->
  <rect x="420" y="520" width="360" height="80" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
  <text x="600" y="554" text-anchor="middle" font-size="15" font-weight="600" fill="#4A1B0C">ColorPalette</text>
  <text x="600" y="578" text-anchor="middle" font-size="13" fill="#993C1D">44 colours · all fragments</text>

  <!-- ColorPalette connections -->
  <line x1="420" y1="540" x2="340" y2="540" stroke="#993C1D" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-coral)"/>
  <line x1="780" y1="540" x2="860" y2="540" stroke="#993C1D" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-coral)"/>
  <line x1="600" y1="520" x2="600" y2="380" stroke="#993C1D" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-coral)"/>

  <!-- VisionAnalyzer — top centre -->
  <rect x="420" y="100" width="360" height="80" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="600" y="134" text-anchor="middle" font-size="15" font-weight="600" fill="#085041">VisionAnalyzer</text>
  <text x="600" y="158" text-anchor="middle" font-size="13" fill="#0F6E56">TFLite · ML Kit · k-means</text>

  <!-- VisionAnalyzer → fragments -->
  <line x1="420" y1="140" x2="340" y2="140" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <line x1="780" y1="140" x2="860" y2="140" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <!-- VisionAnalyzer → ColorPalette -->
  <line x1="600" y1="180" x2="600" y2="300" stroke="#0F6E56" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-teal)"/>

  <!-- TutorialManager — right centre -->
  <rect x="1020" y="300" width="140" height="80" rx="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
  <text x="1090" y="330" text-anchor="middle" font-size="14" font-weight="600" fill="#412402">Tutorial</text>
  <text x="1090" y="352" text-anchor="middle" font-size="12" fill="#854F0B">15 steps</text>
  <text x="1090" y="370" text-anchor="middle" font-size="12" fill="#854F0B">Overlay UI</text>
  <line x1="1020" y1="340" x2="780" y2="340" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- Legend -->
  <line x1="80" y1="648" x2="120" y2="648" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="130" y="653" font-size="12" fill="#444">Routes / controls</text>

  <line x1="320" y1="648" x2="360" y2="648" stroke="#993C1D" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-coral)"/>
  <text x="370" y="653" font-size="12" fill="#444">Uses shared service</text>

  <line x1="580" y1="648" x2="620" y2="648" stroke="#185FA5" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arr)"/>
  <text x="630" y="653" font-size="12" fill="#444">Passes data</text>

  <line x1="820" y1="648" x2="860" y2="648" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <text x="870" y="653" font-size="12" fill="#444">Provides analysis</text>

</svg>
